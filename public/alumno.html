<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Aula Virtual - Alumno</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4 md:p-8">

  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
    
    <aside class="bg-white p-4 rounded-xl shadow border border-gray-200 h-fit md:col-span-1">
      <h3 class="font-bold text-gray-700 mb-3 border-b pb-2">📂 Índice de Temas</h3>
      <ul id="indice-temas" class="space-y-2 text-sm text-blue-600 font-medium">
        </ul>
    </aside>

    <main class="md:col-span-3 space-y-6">
      
      <div class="bg-blue-600 text-white p-6 rounded-2xl shadow-lg relative">
        <h1 class="text-2xl font-bold">Mi Aula Virtual</h1>
        <p id="info-alumno" class="text-sm opacity-90 mt-1">Estudiante: Cargando... | Curso: -- </p>
        <div id="alertas-encabezado" class="mt-2 text-xs bg-amber-400 text-gray-900 font-bold px-2 py-1 rounded inline-block hidden">
          ⚠️ Tenés actividades vencidas pendientes
        </div>
        <a id="btn-whatsapp" target="_blank" class="absolute top-6 right-16 bg-green-500 p-2 rounded-full font-bold text-xs hidden">💬 Grupo</a>
        <button onclick="location.href='/'" class="absolute top-6 right-6 bg-red-500 px-3 py-1 rounded font-bold text-xs">Salir</button>
      </div>

      <div class="bg-slate-50 p-5 rounded-xl border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-2">
          <h2 class="font-bold text-gray-800 flex items-center gap-2">🤖 Consultar a Gemini AI</h2>
          <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full font-bold">Tutor de Matemática</span>
        </div>
        <p class="text-xs text-gray-600 mb-3">¿Tenés dudas con una ecuación, teoría o querés verificar tu procedimiento? Preguntale a la IA:</p>
        <div class="flex gap-2">
          <input type="text" id="duda-ia" placeholder="Escribí tu duda matemática acá..." class="flex-1 p-3 border border-gray-300 rounded-xl text-sm">
          <button onclick="preguntarAGemini()" class="bg-blue-600 text-white px-5 rounded-xl font-bold hover:bg-blue-700 transition">Preguntar</button>
        </div>
        <div id="respuesta-ia" class="mt-3 p-3 bg-white border border-gray-200 rounded-lg text-sm text-gray-700 hidden"></div>
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-lg text-gray-800">📌 Tus Actividades Asignadas</h2>
        <div id="contenedor-tareas" class="space-y-4">
          </div>
      </div>

    </main>
  </div>

  <script>
    // Conexión real con las APIs para renderizar y ordenar los elementos según requerimientos
    async function cargarContenido() {
      const res = await fetch('/api/alumno/mis-tareas');
      const tareas = await res.json();
      
      const contenedor = document.getElementById('contenedor-tareas');
      const indice = document.getElementById('indice-temas');
      contenedor.innerHTML = '';
      indice.innerHTML = '';

      // Crear Índice Único de Temas
      const temasUnicos = [...new Set(tareas.map(t => t.tema))];
      temasUnicos.forEach(tema => {
        indice.innerHTML += `<li><a href="#${tema.replace(/\s+/g, '')}" class="hover:underline">📄 ${tema}</a></li>`;
      });

      // Renderizar y clasificar según urgencia/bloqueo por prerrequisito
      tareas.forEach(tarea => {
        let controlHTML = '';
        
        if (tarea.bloqueada) {
          controlHTML = `<span class="text-xs bg-gray-300 text-gray-600 font-bold px-3 py-1 rounded-lg">🔒 Bloqueado (Requiere #${tarea.prerrequisito_id})</span>`;
        } else if (tarea.completada) {
          controlHTML = `<span class="text-xs bg-green-100 text-green-700 font-bold px-3 py-1 rounded-lg">✓ Realizada</span>`;
        } else {
          controlHTML = `<button onclick="marcarTerminada(${tarea.id})" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-4 py-2 rounded-lg">✓ Terminar</button>`;
        }

        contenedor.innerHTML += `
          <div id="${tarea.tema.replace(/\s+/g, '')}" class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center ${tarea.bloqueada ? 'opacity-50' : ''}">
            <div>
              <span class="text-xs font-bold text-gray-400 block uppercase">${tarea.tema}</span>
              <h4 class="font-bold text-gray-800 text-base">${tarea.actividad} (#${tarea.id})</h4>
              <p class="text-xs text-red-500 mt-1 font-medium">Fecha de Entrega: ${tarea.fecha_entrega || 'Sin fecha'}</p>
            </div>
            <div>${controlHTML}</div>
          </div>
        `;
      });
    }

    async function preguntarAGemini() {
      const duda = document.getElementById('duda-ia').value;
      const contenedorRespuesta = document.getElementById('respuesta-ia');
      contenedorRespuesta.classList.remove('hidden');
      contenedorRespuesta.innerText = "Pensando...";
      
      const res = await fetch('/api/consultar-gemini', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ duda })
      });
      const data = await res.json();
      contenedorRespuesta.innerText = data.respuesta;
    }

    async function marcarTerminada(id) {
      await fetch('/api/alumno/entregar-tarea', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ tarea_id: id })
      });
      cargarContenido();
    }

    window.onload = cargarContenido;
  </script>
</body>
</html>
